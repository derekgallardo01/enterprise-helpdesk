name: Build and Deploy SPFx

on:
  push:
    branches: [main]
    paths:
      - "spfx/**"
  workflow_dispatch:

env:
  SPFX_PATH: spfx/helpdesk-spfx
  NODE_VERSION: "18.x"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.SPFX_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.SPFX_PATH }}

      - name: Run linter
        run: npx tsc --noEmit
        working-directory: ${{ env.SPFX_PATH }}

      - name: Run unit tests
        run: npm test -- --ci --coverage
        working-directory: ${{ env.SPFX_PATH }}

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.SPFX_PATH }}/coverage/

      - name: Build solution
        run: npx gulp bundle --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Package solution
        run: npx gulp package-solution --ship
        working-directory: ${{ env.SPFX_PATH }}

      - name: Upload .sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: ${{ env.SPFX_PATH }}/sharepoint/solution/*.sppkg

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download .sppkg artifact
        uses: actions/download-artifact@v4
        with:
          name: spfx-package

      # Deploy to SharePoint App Catalog using CLI for Microsoft 365
      # Uses certificate-based auth (not username/password) for security
      - name: Login to Microsoft 365
        uses: pnp/action-cli-login@v3
        with:
          CERTIFICATE_ENCODED: ${{ secrets.SP_CERTIFICATE_ENCODED }}
          CERTIFICATE_PASSWORD: ${{ secrets.SP_CERTIFICATE_PASSWORD }}
          APP_ID: ${{ secrets.SP_APP_ID }}
          TENANT: ${{ secrets.SP_TENANT_ID }}

      - name: Deploy to App Catalog
        uses: pnp/action-cli-deploy@v5
        with:
          APP_FILE_PATH: "*.sppkg"
          SITE_COLLECTION_URL: ${{ secrets.SP_APP_CATALOG_URL }}
          SKIP_FEATURE_DEPLOYMENT: true
